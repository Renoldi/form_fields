name: form_fields_example
description: Example application demonstrating FormFields package usage.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  form_fields:
    path: ../
  form_fields_fcm:
    git:
      url: https://github.com/Renoldi/form_fields_fcm.git
      ref: main
  logger: any
  go_router: any
  shared_preferences: any
  provider: any
  json_annotation: any
  dio: any
  permission_handler: any
  camera: any
  google_fonts: any
  file_picker: ^11.0.2
  workmanager: any
  path_provider: any
  path: any
  geolocator: any
  flutter_map: any
  latlong2: any
  # firebase_core, firebase_messaging and flutter_local_notifications
  # are provided by the optional `form_fields_fcm` package.

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: any
  flutter_lints: any

flutter:
  uses-material-design: true
  assets:
    - migrations/
