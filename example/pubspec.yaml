name: form_fields_example
description: Example application demonstrating FormFields package usage.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: any
  intl: any
  form_fields:
    path: ../
  logger: any
  go_router: any
  dio: any
  json_annotation: any
  shared_preferences: any
  permission_handler: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  json_serializable: any

flutter:
  uses-material-design: true
