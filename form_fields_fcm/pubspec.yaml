name: form_fields_fcm
description: Optional FCM helpers extracted from `form_fields` to avoid forcing Firebase deps on consumers who don't need them.
version: 0.1.0
homepage: https://github.com/Renoldi/form_fields_fcm
repository: https://github.com/Renoldi/form_fields_fcm.git

environment:
  sdk: "^3.12.2"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.12.0
  firebase_messaging: 16.4.1
  flutter_local_notifications: any
  path_provider: any

dev_dependencies:
  flutter_lints: any

flutter:
  uses-material-design: true
