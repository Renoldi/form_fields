name: form_fields
description: A comprehensive and reusable Flutter form field widget with support
  for multiple input types including text, email, phone, password, date, time,
  and more.
publish_to: none
version: 1.1.0
homepage: https://github.com/renoldi/form_fields
repository: https://github.com/renoldi/form_fields
issue_tracker: https://github.com/renoldi/form_fields/issues

environment:
  sdk: ^3.12.2

dependencies:
  dio: any
  flutter:
    sdk: flutter
  intl: any
  json_annotation: any
  logger: any
  logging: any
  sqflite: any
  path: any
  path_provider: any
  crypto: any
  workmanager: any
  provider: any
  cunning_document_scanner: any
  image_picker: any
  permission_handler: any
  signature: any
  mobile_scanner: any
  camera: any
  connectivity_plus: any
  flutter_widget_from_html: any
  skeleton_text: any
  file_picker: ^11.0.2
  flutter_map: ^8.3.1
  latlong2: any
  geocoding: ^5.0.0
  geolocator: any
  # Firebase deps moved to the optional `form_fields_fcm` package.
  # form_fields_fcm:
  #   git:
  #     url: https://github.com/Renoldi/form_fields.git
  #     path: form_fields_fcm
  #     ref: master

dev_dependencies:
  build_runner: any
  flutter_lints: any
  flutter_test:
    sdk: flutter
  json_serializable: any
  mockito: any

flutter:
  uses-material-design: true
