name: form_fields
description: A comprehensive and reusable Flutter form field widget with support
  for multiple input types including text, email, phone, password, date, time,
  and more.
version: 2.0.0
homepage: https://github.com/renoldi/form_fields
repository: https://github.com/renoldi/form_fields
issue_tracker: https://github.com/renoldi/form_fields/issues

environment:
  sdk: ">=3.0.0 <5.0.0"
  flutter: ">=3.7.0"

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  intl: ^0.20.2
  json_annotation: ^4.12.0
  logger: ^2.7.0
  logging: ^1.3.0
  sqflite: ^2.4.3
  path: ^1.9.1
  path_provider: ^2.1.6
  crypto: ^3.0.7
  flutter_foreground_task: ^9.2.2
  # file_picker removed; using assets and app directories for import/export
  provider: ^6.1.5+1
  cunning_document_scanner: ^2.3.0
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  signature: ^6.3.0
  mobile_scanner: ^7.2.0
  camera: ^0.12.0+1
  connectivity_plus: ^7.1.1
  flutter_widget_from_html: ^0.17.2
  skeleton_text: ^3.0.1
  file_picker: ^11.0.2

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
