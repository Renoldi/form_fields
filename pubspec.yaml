name: form_fields
description: A comprehensive and reusable Flutter form field widget with support
  for multiple input types including text, email, phone, password, date, time,
  and more.
version: 2.0.0
homepage: https://github.com/renoldi/form_fields
repository: https://github.com/renoldi/form_fields
issue_tracker: https://github.com/renoldi/form_fields/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  dio: any
  flutter:
    sdk: flutter
  intl: any
  json_annotation: any
  logger: any
  logging: any
  sqflite: any
  path: any
  path_provider: any
  crypto: any
  flutter_foreground_task: any
  # file_picker removed; using assets and app directories for import/export
  provider: any
  cunning_document_scanner: any
  image_picker: any
  permission_handler: any
  signature: any
  mobile_scanner: any
  camera: any
  connectivity_plus: any
  flutter_widget_from_html: any
  skeleton_text: any
  file_picker: ^11.0.2

dev_dependencies:
  build_runner: any
  flutter_lints: any
  flutter_test:
    sdk: flutter
  json_serializable: any

flutter:
  uses-material-design: true
